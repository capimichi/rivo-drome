version: '3.8'

services:
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rivodrome}
      MYSQL_DATABASE: ${DB_NAME:-rivodrome}
      MYSQL_USER: ${DB_USER:-rivodrome}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rivodrome}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT:-8000}:${API_PORT:-8000}"
    env_file:
      - .env
    volumes:
      - .:/app
      - ${NAVIDROME_MUSIC_HOST_DIR}:${NAVIDROME_MUSIC_DIR}
      - ${SLSKD_DOWNLOADS_HOST_DIR}:${SLSKD_DOWNLOADS_DIR}
    depends_on:
      - mariadb
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m rivo_drome.cli cron
    env_file:
      - .env
    volumes:
      - .:/app
      - ${NAVIDROME_MUSIC_HOST_DIR}:${NAVIDROME_MUSIC_DIR}
      - ${SLSKD_DOWNLOADS_HOST_DIR}:${SLSKD_DOWNLOADS_DIR}
    depends_on:
      - mariadb
      - redis
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:
