version: '3.8'

services:
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rivodrome}
      MYSQL_DATABASE: ${DB_NAME:-rivodrome}
      MYSQL_USER: ${DB_USER:-rivodrome}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rivodrome}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_HOST_PORT:-8000}:${API_PORT:-8000}"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - mariadb
    restart: unless-stopped

volumes:
  mariadb_data:
